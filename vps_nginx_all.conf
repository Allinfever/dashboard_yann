server {
    server_name letelos.fr dashboard-travail.letelos.fr saasengine.letelos.fr;
    root /var/www/dashboard-yann/live/dist;
    index index.html;
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_intercept_errors off;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/letelos.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/letelos.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot



}
server {
    if ($host = saasengine.letelos.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = dashboard-travail.letelos.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = letelos.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name letelos.fr dashboard-travail.letelos.fr saasengine.letelos.fr;
    return 404; # managed by Certbot






}
